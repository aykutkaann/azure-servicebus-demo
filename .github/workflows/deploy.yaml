
name: Deploy to Azure

on:
  push:
    branches:
      - main

jobs:
  infrastructure:
    name: 🏗️ Setup Infrastructure (Terraform)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform init
        working-directory: infra/
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.AZURE_STORAGE_KEY }}"

      - name: Terraform plan
        working-directory: infra/
        run: terraform plan

      - name: Terraform apply
        working-directory: infra/
        run: terraform apply -auto-approve

  build-and-push:
    name: 🐳 Build and Push Image
    runs-on: ubuntu-latest
    needs: infrastructure

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/message-processor:${{ github.sha }} ./app
          docker push ${{ secrets.ACR_NAME }}.azurecr.io/message-processor:${{ github.sha }}

  deploy:
    name: 🚀 Job Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get ACR credentials
        id: acr-creds
        run: |
          ACR_USERNAME=$(az acr credential show \
            --name ${{ secrets.ACR_NAME }} \
            --query username -o tsv)
          ACR_PASSWORD=$(az acr credential show \
            --name ${{ secrets.ACR_NAME }} \
            --query 'passwords[0].value' -o tsv)
          echo "ACR_USERNAME=$ACR_USERNAME" >> $GITHUB_ENV
          echo "ACR_PASSWORD=$ACR_PASSWORD" >> $GITHUB_ENV

      - name: Container Apps Job create or update
        run: |
          JOB_EXISTS=$(az containerapp job show \
            --name job-message-processor \
            --resource-group rg-eventdriven-demo \
            --query name -o tsv 2>/dev/null || echo "")

          if [ -z "$JOB_EXISTS" ]; then
            echo "Job creating..."
            az containerapp job create \
              --name job-message-processor \
              --resource-group rg-eventdriven-demo \
              --environment cae-eventdriven-demo \
              --trigger-type Event \
              --replica-timeout 300 \
              --replica-retry-limit 3 \
              --min-executions 0 \
              --max-executions 10 \
              --polling-interval 30 \
              --scale-rule-name "servicebus-scaler" \
              --scale-rule-type "azure-servicebus" \
              --scale-rule-metadata "queueName=order-processing-queue" "namespace=sb-eventdriven-demo" "messageCount=5" \
              --scale-rule-auth "connection=sb-connection" \
              --image "${{ secrets.ACR_NAME }}.azurecr.io/message-processor:${{ github.sha }}" \
              --cpu 0.5 --memory 1.0Gi \
              --registry-server "${{ secrets.ACR_NAME }}.azurecr.io" \
              --registry-username "$ACR_USERNAME" \
              --registry-password "$ACR_PASSWORD" \
              --secrets "sb-connection=${{ secrets.SERVICEBUS_CONNECTION_STRING }}" \
              --env-vars \
                "SERVICEBUS_CONNECTION_STRING=secretref:sb-connection" \
                "SERVICEBUS_QUEUE_NAME=order-processing-queue"
          else
            echo "Job updating..."
            az containerapp job update \
              --name job-message-processor \
              --resource-group rg-eventdriven-demo \
              --image "${{ secrets.ACR_NAME }}.azurecr.io/message-processor:${{ github.sha }}"
          fi

      - name: Deployment successful
        run: echo "🎉 Deployment successful!"
